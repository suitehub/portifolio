name: Build and Test Applet

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci || npm install

    - name: Verify Code Type-checking (Lint)
      run: npm run lint

    - name: Build Application (Frontend & Backend Server Bundle)
      run: npm run build
      env:
        NODE_ENV: production
